version: "3.9"

x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  networks:
    - venbot_net

x-app-depends: &app-depends
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: venbot
      POSTGRES_PASSWORD: venbot_pass
      POSTGRES_DB: venbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venbot -d venbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - venbot_net

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - venbot_net

  # ─── FastAPI App ────────────────────────────────────────────
  app:
    <<: [*app-base, *app-depends]
    # --reload activo en desarrollo: los cambios en ./app se reflejan sin rebuild
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # mount local para hot-reload en desarrollo
      - media_files:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.venbot.rule=Host(`${APP_DOMAIN:-venbot.localhost}`)"
      - "traefik.http.routers.venbot.entrypoints=websecure"
      - "traefik.http.routers.venbot.tls.certresolver=letsencrypt"
      - "traefik.http.services.venbot.loadbalancer.server.port=8000"

  # ─── Celery Worker ──────────────────────────────────────────
  celery-worker:
    <<: [*app-base, *app-depends]
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q default,content,notifications
    volumes:
      - ./app:/app/app
      - media_files:/app/media

  # ─── Celery Beat (scheduler) ────────────────────────────────
  celery-beat:
    <<: [*app-base, *app-depends]
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --schedule /app/celerybeat/celerybeat-schedule
    volumes:
      - ./app:/app/app
      - celerybeat_data:/app/celerybeat

  # ─── Flower (monitoreo de tareas Celery) ───────────────────
  flower:
    <<: *app-base
    command: celery -A app.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower123}
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  media_files:
  celerybeat_data:

networks:
  venbot_net:
    driver: bridge
