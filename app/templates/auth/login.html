<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Venbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md" x-data="loginForm()" @submit.prevent="submit">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4">
        <span class="text-white text-2xl font-bold">V</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Bienvenido a Venbot</h1>
      <p class="text-gray-400 mt-1">Ingresa a tu cuenta para continuar</p>
    </div>

    <!-- Formulario -->
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800">
      <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-900/50 text-red-300 border border-red-800 text-sm"></div>

      <form id="login-form">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Correo electrónico</label>
            <input type="email" name="email" required
                   class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500
                          focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                   placeholder="tu@empresa.com" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white placeholder-gray-500
                          focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                   placeholder="••••••••" />
          </div>
        </div>

        <button type="submit" id="btn-login"
                class="mt-6 w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl
                       transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50">
          Iniciar sesión
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        ¿No tienes cuenta?
        <a href="/auth/registro" class="text-indigo-400 hover:text-indigo-300 font-medium">Regístrate gratis</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errorMsg.classList.add('hidden');

      const data = {
        email: form.email.value,
        password: form.password.value,
      };

      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await resp.json();

        if (!resp.ok) {
          errorMsg.textContent = json.detail || 'Error al iniciar sesión';
          errorMsg.classList.remove('hidden');
        } else {
          localStorage.setItem('access_token', json.access_token);
          localStorage.setItem('refresh_token', json.refresh_token);
          window.location.href = '/dashboard/';
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
